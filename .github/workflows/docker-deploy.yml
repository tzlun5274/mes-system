name: Docker Build and Deploy

on:
  push:
    branches:
      - main  # 監控 'main' 分支的推送事件
  pull_request:
    branches:
      - main  # 也監控 pull request 對 'main' 分支的更新

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 步驟 1：檢出代碼
      - name: Checkout code
        uses: actions/checkout@v2

      # 步驟 2：設置 Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      # 步驟 3：登入 Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}  # GitHub Secrets 中的 DOCKER_USERNAME
          password: ${{ secrets.DOCKER_PASSWORD }}  # GitHub Secrets 中的 DOCKER_PASSWORD

      # 步驟 4：構建 Docker 映像
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mes-system:latest .

      # 步驟 5：推送 Docker 映像到 Docker Hub
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/mes-system:latest
